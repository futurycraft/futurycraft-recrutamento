<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuturyCraft - Painel Staff</title>

<link rel="stylesheet" href="painel.css">

</head>


<body>


<div class="painel-admin">



<!-- TOPO -->


<header class="admin-header">


<div>


<h1>
FuturyCraft
</h1>


<p>
Painel Administrativo de Candidaturas
</p>


</div>



<button class="logout-btn" onclick="logout()">

Sair

</button>


</header>








<!-- ESTATÍSTICAS -->


<section class="dashboard">


<div class="stat-card pendente">


<div class="stat-title">
Pendentes
</div>


<strong id="pendentes">
0
</strong>


<span>
Aguardando análise
</span>


</div>





<div class="stat-card aprovado">


<div class="stat-title">
Aprovados
</div>


<strong id="aprovados">
0
</strong>


<span>
Membros aceitos
</span>


</div>





<div class="stat-card recusado">


<div class="stat-title">
Recusados
</div>


<strong id="recusados">
0
</strong>


<span>
Candidaturas encerradas
</span>


</div>



</section>









<!-- FILTROS -->


<section class="controle">


<h2>
Candidaturas
</h2>


<p>
Gerencie e avalie novos membros da equipe.
</p>




<div class="filtros">


<button onclick="filtrar('Todos')">
Todas
</button>


<button onclick="filtrar('Pendente')">
Pendentes
</button>


<button onclick="filtrar('Aprovado')">
Aprovados
</button>


<button onclick="filtrar('Recusado')">
Recusados
</button>


</div>



</section>









<!-- LISTA -->


<section class="candidatos-container">


<div id="lista-candidatos">


<div class="loading">

Carregando candidatos...

</div>


</div>



</section>






</div>






<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="admin.js"></script>


</body>

</html>
