<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuturyCraft - Painel Staff</title>

<link rel="stylesheet" href="painel.css">

</head>


<body>


<div class="admin-container">



<!-- ==========================
     TOPO
========================== -->


<header class="admin-topo">



<div class="estatisticas">



<div class="mini-card pendente">


<strong id="pendentes">
0
</strong>


<span>
Pendentes
</span>


</div>





<div class="mini-card aprovado">


<strong id="aprovados">
0
</strong>


<span>
Aprovados
</span>


</div>





<div class="mini-card recusado">


<strong id="recusados">
0
</strong>


<span>
Recusados
</span>


</div>



</div>






<div class="titulo-painel">


<h1>
FuturyCraft
</h1>


<p>
Painel Staff
</p>


</div>




<button onclick="abrirUsuario()">

👤 Minha Conta

</button>

<button class="logout" onclick="logout()">

Sair

</button>



</header>









<!-- ==========================
     MENU
========================== -->


<nav class="menu-painel">



<div class="menu-item">


<button>
▼ Candidaturas
</button>


<div class="submenu">


<button onclick="filtrar('Todos')">
Todas
</button>


<button onclick="filtrar('Pendente')">
Pendentes
</button>


<button onclick="filtrar('Aprovado')">
Aprovados
</button>


<button onclick="filtrar('Recusado')">
Recusados
</button>


</div>


</div>







<div class="menu-item">


<button>
▼ Gerenciamento
</button>


<div class="submenu">


<button onclick="abrirStaff()">

Gerenciar Staff

</button>


<button>
Logs
</button>


</div>


</div>








<div class="menu-item">


<button>
▼ Configurações
</button>


<div class="submenu">


<button>
Sistema
</button>


<button>
Permissões
</button>


</div>


</div>





</nav>









<!-- ==========================
     LISTA
========================== -->


<section class="area-candidatos">



<div class="titulo-area">


<h2>
Candidatos
</h2>


<p>
Gerencie todas as candidaturas recebidas.
</p>


</div>





<div id="lista-candidatos" class="grid-candidatos">


<div class="loading">

Carregando candidatos...

</div>


</div>



</section>









<!-- ==========================
     RODAPÉ
========================== -->


<footer class="footer-painel">


<h2>
FuturyCraft Panel
</h2>


<p>
Sistema de recrutamento Staff
</p>


<span>
Versão 1.0
</span>


</footer>





</div>







<script src="supabase-js"></script>
<script src="auth.js"></script>
<script src="proteger.js"></script>
<script src="admin.js"></script>


</body>

</html>
