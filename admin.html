<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuturyCraft - Painel Staff</title>

<link rel="stylesheet" href="painel.css">

</head>


<body>


<div class="painel">



<header class="topo">


<h1>
FuturyCraft
</h1>


<h2>
Painel de Candidaturas Staff
</h2>



<button class="sair" onclick="logout()">

Sair

</button>


</header>







<!-- DASHBOARD -->


<section id="dashboard">



<div class="status-card pendente">


<h3>
Pendentes
</h3>


<span id="pendentes">
0
</span>


</div>





<div class="status-card aprovado">


<h3>
Aprovados
</h3>


<span id="aprovados">
0
</span>


</div>





<div class="status-card recusado">


<h3>
Recusados
</h3>


<span id="recusados">
0
</span>


</div>



</section>









<!-- FILTROS -->


<section class="filtros">


<h3>
Filtrar candidaturas
</h3>



<div class="botoes-filtro">


<button onclick="filtrar('Todos')">

Todos

</button>



<button onclick="filtrar('Pendente')">

Pendentes

</button>



<button onclick="filtrar('Aprovado')">

Aprovados

</button>



<button onclick="filtrar('Recusado')">

Recusados

</button>



</div>


</section>









<!-- LISTA -->


<section class="lista-area">


<h2>
Candidatos
</h2>



<div id="lista-candidatos">


<div class="carregando">

Carregando candidatos...

</div>


</div>



</section>





</div>







<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="admin.js"></script>



</body>

</html>
