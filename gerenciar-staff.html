<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciamento de Staff | FuturyCraft</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="staff-container">


    <div class="staff-header">

        <div class="staff-icon">
            🛡️
        </div>

        <h1>
            Gerenciamento de Staff
        </h1>

        <p>
            Controle de cargos, membros e evolução da equipe FuturyCraft
        </p>

    </div>




    <div class="staff-grid">



        <!-- ADICIONAR STAFF -->

        <div class="staff-box">


            <div class="box-title">

                <h2>
                    Adicionar membro
                </h2>

                <span>
                    + STAFF
                </span>

            </div>



            <label>
                Usuário
            </label>


            <select id="usuarioStaff">

                <option>
                    Carregando usuários...
                </option>

            </select>




            <label>
                Cargo
            </label>


            <select id="cargoStaff">


                <option value="fundador">
                    👑 Fundador
                </option>


                <option value="diretor">
                    ⭐ Diretor
                </option>


                <option value="gerente">
                    🔷 Gerente
                </option>


                <option value="admin">
                    🛡 Admin
                </option>


                <option value="moderador">
                    🔨 Moderador
                </option>


                <option value="ajudante">
                    💬 Ajudante
                </option>


            </select>



            <button onclick="adicionarStaff()">

                Adicionar Staff

            </button>



        </div>








        <!-- LISTA STAFF -->

        <div class="staff-box equipe-box">


            <div class="box-title">

                <h2>
                    Equipe Atual
                </h2>


                <span>
                    STAFF
                </span>


            </div>



            <div id="listaStaff">


                <div class="loading">

                    Carregando equipe...

                </div>


            </div>



        </div>



    </div>







    <button class="voltar"
    onclick="window.location.href='admin.html'">


        ← Voltar ao painel


    </button>




</div>







<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="permissoes.js"></script>

<script src="gerenciar-staff.js"></script>


</body>


</html>
