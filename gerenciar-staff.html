<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciamento Staff | FuturyCraft</title>


<link rel="stylesheet" href="gerenciar-staff.css">


</head>


<body>


<div class="staff-container">



<header class="staff-header">


<div class="logo-staff">

🛡️

</div>



<div>

<h1>

Gerenciamento de Staff

</h1>


<p>

Controle completo da equipe FuturyCraft

</p>


</div>


</header>







<div class="staff-layout">





<!-- ADICIONAR -->

<section class="box adicionar">



<h2>

Adicionar membro

</h2>




<label>

Jogador

</label>


<select id="usuarioStaff">

<option>

Carregando usuários...

</option>

</select>






<label>

Cargo

</label>



<select id="cargoStaff">


<option value="fundador">

👑 Fundador

</option>


<option value="diretor">

⭐ Diretor

</option>


<option value="gerente">

🔷 Gerente

</option>


<option value="admin">

🛡 Admin

</option>


<option value="moderador">

🔨 Moderador

</option>


<option value="ajudante">

💬 Ajudante

</option>


</select>







<button 
class="btn-add"
onclick="adicionarStaff()">

Adicionar Staff

</button>




</section>









<!-- LISTA -->

<section class="box equipe">



<div class="titulo-equipe">


<h2>

Equipe Atual

</h2>


<span>

STAFF

</span>


</div>






<div id="listaStaff" class="cards-staff">


<div class="loading">

Carregando equipe...

</div>


</div>




</section>






</div>







<button class="btn-voltar"

onclick="window.location.href='admin.html'">

← Voltar painel

</button>





</div>









<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="permissoes.js"></script>

<script src="gerenciar-staff.js"></script>



</body>


</html>
