<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Gerenciamento de Staff | FuturyCraft</title>


<link rel="stylesheet" href="gerenciar-staff.css">


</head>


<body>



<div class="staff-page">





<header class="staff-header">


<div class="staff-icon">

🛡️

</div>



<div>

<h1>

Gerenciamento de Staff

</h1>


<p>

Controle de cargos e membros da equipe FuturyCraft

</p>


</div>


</header>









<section class="staff-manager">






<!-- ADICIONAR -->

<div class="staff-control">



<h2>

Adicionar Staff

</h2>





<label>

Jogador

</label>


<select id="usuarioStaff">

<option>

Carregando usuários...

</option>

</select>







<label>

Cargo

</label>


<select id="cargoStaff">


<option value="fundador">

👑 Fundador

</option>


<option value="diretor">

⭐ Diretor

</option>


<option value="gerente">

🔷 Gerente

</option>


<option value="admin">

🛡 Admin

</option>


<option value="moderador">

🔨 Moderador

</option>


<option value="ajudante">

💬 Ajudante

</option>


</select>








<button 
onclick="adicionarStaff()"
class="btn-add">


Adicionar à Staff


</button>




</div>












<!-- LISTA -->

<div class="staff-list-area">



<div class="list-title">


<h2>

Equipe Atual

</h2>


<span>

STAFF

</span>


</div>







<div id="listaStaff" class="staff-grid">



<div class="loading">

Carregando equipe...

</div>



</div>





</div>







</section>









<button

class="btn-back"

onclick="window.location.href='admin.html'">


← Voltar


</button>







</div>









<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="auth.js"></script>


<script src="permissoes.js"></script>


<script src="gerenciar-staff.js"></script>



</body>


</html>
