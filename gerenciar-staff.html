<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Gerenciamento de Staff | FuturyCraft</title>


<link rel="stylesheet" href="gerenciar-staff.css">


</head>


<body>



<div class="page">







<header class="top-header">



    <div class="header-icon">

        🛡️

    </div>



    <div class="header-info">


        <h1>

            Gerenciamento de Staff

        </h1>


        <p>

            Controle de cargos, permissões e evolução da equipe FuturyCraft

        </p>


    </div>



</header>









<!-- ESTATISTICAS -->

<section class="stats">



    <div class="stat-card">


        <span>

        🛡️

        </span>


        <div>

            <h3 id="totalStaff">

            0

            </h3>


            <p>

            Total Staff

            </p>


        </div>


    </div>







    <div class="stat-card">


        <span>

        🟢

        </span>


        <div>

            <h3 id="staffAtivo">

            0

            </h3>


            <p>

            Ativos

            </p>


        </div>


    </div>







    <div class="stat-card">


        <span>

        👤

        </span>


        <div>

            <h3 id="staffMembro">

            0

            </h3>


            <p>

            Membros

            </p>


        </div>


    </div>





</section>









<main class="dashboard">







<!-- ADICIONAR -->


<section class="panel add-panel">



<div class="panel-header">


<h2>

Adicionar Staff

</h2>


<span>

CONTROLE

</span>


</div>






<div class="form-group">


<label>

Jogador

</label>



<select id="usuarioStaff">


<option>

Carregando usuários...

</option>


</select>



</div>








<div class="form-group">


<label>

Novo cargo

</label>



<select id="cargoStaff">


<option value="fundador">

👑 Fundador

</option>


<option value="diretor">

⭐ Diretor

</option>


<option value="gerente">

🔷 Gerente

</option>


<option value="admin">

🛡 Admin

</option>


<option value="moderador">

🔨 Moderador

</option>


<option value="ajudante">

💬 Ajudante

</option>


</select>



</div>







<button

onclick="adicionarStaff()"

class="btn-primary">


Adicionar membro


</button>





</section>









<!-- EQUIPE -->

<section class="panel team-panel">



<div class="panel-header">


<h2>

Equipe Atual

</h2>



<span>

STAFF

</span>



</div>







<div id="listaStaff" class="staff-grid">



<div class="loading">


Carregando equipe...


</div>



</div>





</section>







</main>








<button

class="btn-back"

onclick="window.location.href='admin.html'">


← Voltar ao painel


</button>







</div>









<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="auth.js"></script>


<script src="permissoes.js"></script>


<script src="gerenciar-staff.js"></script>



</body>


</html>
