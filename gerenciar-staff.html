<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciar Staff | FuturyCraft</title>


<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="staff-container">


<div class="staff-header">

<h1>
Gerenciamento de Staff
</h1>

<p>
Controle de cargos e permissões da equipe FuturyCraft
</p>

</div>





<div class="staff-actions">


<div class="staff-box">


<h2>
Adicionar membro
</h2>


<label>
Usuário
</label>


<select id="usuarioStaff">

<option>
Carregando usuários...
</option>

</select>




<label>
Cargo
</label>


<select id="cargoStaff">


<option value="fundador">
👑 Fundador
</option>


<option value="diretor">
⭐ Diretor
</option>


<option value="gerente">
🔷 Gerente
</option>


<option value="admin">
🛡 Admin
</option>


<option value="moderador">
🔨 Moderador
</option>


<option value="ajudante">
💬 Ajudante
</option>


</select>




<button onclick="adicionarStaff()">

Adicionar Staff

</button>


</div>







<div class="staff-box">


<h2>
Equipe atual
</h2>



<div id="listaStaff">


<div class="loading">

Carregando equipe...

</div>


</div>


</div>



</div>





<button class="voltar"
onclick="window.location.href='admin.html'">

Voltar ao painel

</button>



</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="permissoes.js"></script>

<script src="gerenciar-staff.js"></script>


</body>

</html>
