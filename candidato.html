<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuturyCraft - Análise de Candidato</title>

<link rel="stylesheet" href="candidato.css">

</head>


<body>


<div class="candidato-container">



<!-- ==========================
     CABEÇALHO
========================== -->


<header class="cabecalho">


<button onclick="voltar()" class="voltar">

← Voltar

</button>



<div class="titulo">

<h1>
FuturyCraft
</h1>


<p>
Análise de candidatura Staff
</p>

</div>



</header>










<!-- ==========================
     PERFIL
========================== -->


<section class="card perfil-box">


<div id="perfil-candidato">


<div class="loading">

Carregando candidato...

</div>


</div>


</section>









<!-- ==========================
     AÇÕES
========================== -->


<section class="card">


<h2>
Decisão da equipe
</h2>



<div class="acoes">


<button onclick="alterarStatus('Aprovado')" class="aprovar">
✓ Aprovar candidato
</button>


<button onclick="alterarStatus('Recusado')" class="recusar">
✕ Recusar candidato
</button>

</div>


</section>









<!-- ==========================
     RESPOSTAS
========================== -->


<section class="card">


<h2>
Respostas da candidatura
</h2>



<div id="respostas">


<div class="loading">

Carregando respostas...

</div>


</div>



</section>









<!-- ==========================
     COMENTÁRIOS
========================== -->


<section class="card comentarios">


<div class="titulo-comentarios">


<h2>
Comentários da equipe
</h2>


</div>





<div id="avaliacoes" class="lista-comentarios">


<div class="loading">

Carregando comentários...

</div>


</div>








<div class="novo-comentario">


<div class="contador">

Novo comentário interno

</div>



<textarea 
id="observacao"
placeholder="Digite uma observação para a equipe..."
></textarea>



<button onclick="adicionarAvaliacao()">

💬 Publicar comentário

</button>


</div>


</div>




</section>









</div>








<script src="supabase-js"></script>
<script src="auth.js"></script>
<script src="proteger.js"></script>
<script src="candidato.js"></script>



</body>

</html>
