<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuturyCraft - Análise de Candidato</title>

<link rel="stylesheet" href="candidato.css">

</head>


<body>


<div class="candidato-container">



<!-- ==========================
     CABEÇALHO
========================== -->


<header class="cabecalho">


<button onclick="voltar()" class="voltar">

← Voltar

</button>



<div class="titulo">

<h1>
FuturyCraft
</h1>


<p>
Análise de candidatura Staff
</p>

</div>



</header>










<!-- ==========================
     PERFIL
========================== -->


<section class="card perfil-box">


<div id="perfil-candidato">


<div class="loading">

Carregando candidato...

</div>


</div>


</section>









<!-- ==========================
     AÇÕES
========================== -->


<section class="card">


<h2>
Decisão da equipe
</h2>



<div class="acoes">


<button class="aprovar">

✓ Aprovar candidato

</button>



<button class="recusar">

✕ Recusar candidato

</button>


</div>


</section>









<!-- ==========================
     RESPOSTAS
========================== -->


<section class="card">


<h2>
Respostas da candidatura
</h2>



<div id="respostas">


<div class="loading">

Carregando respostas...

</div>


</div>



</section>









<!-- ==========================
     COMENTÁRIOS
========================== -->


<section class="card comentarios">


<div class="titulo-comentarios">


<h2>
Comentários da equipe
</h2>


<span>
Histórico interno
</span>


</div>





<div id="avaliacoes">


<div class="loading">

Carregando comentários...

</div>


</div>








<div class="novo-comentario">



<textarea

id="observacao"

placeholder="Escreva uma observação sobre este candidato..."

></textarea>




<button onclick="adicionarAvaliacao()">

Adicionar comentário

</button>



</div>




</section>









</div>








<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="candidato.js"></script>



</body>

</html>
