<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura - FuturyCraft</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>FuturyCraft</h1>

    <h2>Candidatura Staff</h2>

    <p>Preencha as informações abaixo.</p>

    <form>

    <p>Nick no Minecraft</p>
    <input type="text" id="nick">

    <p>Usuário do Discord</p>
    <input type="text" id="discord">

    <p>Idade</p>
    <input type="number" id="idade">

    <p>Tempo jogando no FuturyCraft</p>
    <input type="text" id="tempo">

    <p>Disponibilidade diária</p>
    <input type="text" id="disponibilidade">

    <p>Por que deseja entrar para a equipe?</p>
    <textarea id="motivo"></textarea>

    <p>Como você ajudaria o servidor?</p>
    <textarea id="ajuda"></textarea>

    <p>O que faria ao suspeitar de um jogador utilizando hack?</p>
    <textarea id="hack"></textarea>

    <br><br>

    <button type="button" class="botao">
        Enviar Candidatura
    </button>

</form>

</body>

</html>
