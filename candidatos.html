<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura - FuturyCraft</title>

    <link rel="stylesheet" href="painel.css">
</head>

<body>

    <h1>FuturyCraft</h1>

    <h2>Candidatura Staff</h2>

    <p>Informações Básicas</p>

    <p>
        Preencha seus dados corretamente para iniciar sua candidatura.
    </p>


    <form id="form-candidatos">


        <p>Nome completo</p>
        <input 
            type="text" 
            id="nome_completo"
            placeholder="Exemplo: João Silva"
            required
        >


        <p>Nick no Minecraft</p>
        <input 
            type="text" 
            id="nick"
            placeholder="Exemplo: Joao123"
            required
        >


        <p>Usuário do Discord</p>
        <input 
            type="text" 
            id="discord"
            placeholder="Exemplo: joao#0000"
            required
        >


        <p>Qual é a sua idade?</p>
        <input 
            type="number" 
            id="idade"
            placeholder="Exemplo: 16"
            required
        >


        <p>Qual é sua data de nascimento?</p>
        <input 
            type="date"
            id="data_nascimento"
            required
        >


        <p>Como você prefere ser identificado?</p>

        <select id="genero">

            <option value="">
                Prefiro não informar
            </option>

            <option value="masculino">
                Masculino
            </option>

            <option value="feminino">
                Feminino
            </option>

            <option value="outro">
                Outro
            </option>

        </select>


        <br><br>


        <button type="button" class="botao">
            Continuar
        </button>


    </form>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>


</body>
</html>
