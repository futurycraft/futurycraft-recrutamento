<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura - FuturyCraft</title>

    <link rel="stylesheet" href="painel.css">
</head>

<body>

    <h1>FuturyCraft</h1>

    <h2>Candidatura Staff</h2>

    <p>Preencha as informações abaixo.</p>

    <form id="form-candidatos">

        <p>Nick no Minecraft</p>
        <input type="text" id="nick" required>

        <p>Usuário do Discord</p>
        <input type="text" id="discord" required>

        <p>Idade</p>
        <input type="number" id="idade" required>

        <p>Tempo jogando no FuturyCraft</p>
        <input type="text" id="tempo" required>

        <p>Disponibilidade diária</p>
        <input type="text" id="disponibilidade" required>

        <p>Por que deseja entrar para a equipe?</p>
        <textarea id="motivo" required></textarea>

        <p>Como você ajudaria o servidor?</p>
        <textarea id="ajuda" required></textarea>

        <p>O que faria ao suspeitar de um jogador utilizando hack?</p>
        <textarea id="hack" required></textarea>


        <br><br>

        <button type="submit" class="botao">
            Enviar Candidatura
        </button>

    </form>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
